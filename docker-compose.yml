services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-onecloudsync}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-onecloudsync}"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_NAME: ${DB_NAME:-onecloudsync}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      API_KEY: ${API_KEY:?set API_KEY in .env}
      UPLOAD_DIR: /data/uploads
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    volumes:
      - ./photos:/data/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      # BIND_IP restricts which interface the app is reachable on.
      # Default 0.0.0.0 = all interfaces; set your Tailscale IP (100.x.x.x)
      # to make the app reachable only through the VPN.
      - "${BIND_IP:-0.0.0.0}:${BIND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  pgdata:
